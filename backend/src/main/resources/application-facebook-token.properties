# Facebook Token Management Configuration

# Facebook API Configuration
facebook.api.base-url=https://graph.facebook.com
facebook.api.version=v18.0

# Facebook App Credentials (should be in environment variables)
facebook.app.id=${FACEBOOK_APP_ID:your-facebook-app-id}
facebook.app.secret=${FACEBOOK_APP_SECRET:your-facebook-app-secret}

# Token Refresh Configuration
facebook.token.refresh.threshold-hours=1
facebook.token.default-expiry-days=60
facebook.token.retry.max-attempts=3
facebook.token.retry.delay-ms=1000

# Token Health Check Configuration
facebook.token.health.check.enabled=true
facebook.token.health.check.cron=0 0 */6 * * *

# WebClient Configuration for Facebook API
webclient.facebook.api.timeout=10s
webclient.facebook.api.retry.max-attempts=3
webclient.facebook.api.retry.delay=500ms
